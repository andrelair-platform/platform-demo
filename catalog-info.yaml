---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: platform-demo
  description: |
    Phase 13 — tiny Go HTTP service used to demonstrate the full
    minicloud CI/CD pipeline end-to-end. Source pushed → GitHub Actions
    builds + tests + pushes to ghcr.io → CI bumps the image tag in
    minicloud-gitops via the Contents API → ArgoCD reconciles → kubelet
    pulls through Harbor's ghcr proxy cache (Phase 16). Total push-to-
    live: ~3 min. Live at platform-demo.10.0.0.200.nip.io with
    ldflags-injected git SHA in the JSON response.
  annotations:
    backstage.io/source-location: url:https://github.com/andrelair-platform/platform-demo
    github.com/project-slug: andrelair-platform/platform-demo
    argocd/app-name: platform-demo
    backstage.io/kubernetes-id: platform-demo
    prometheus.io/rule: http_request_duration_seconds_count{namespace="gitops-demo"}
    grafana/dashboard-selector: namespace=gitops-demo
    plane.io/project-id: "PT"
  tags:
    - go
    - service
    - demo
    - phase-13
    - cicd
  links:
    - url: https://platform-demo.10.0.0.200.nip.io/
      title: Live service (returns JSON with git SHA)
      icon: web
    - url: https://andrelair-platform.github.io/minicloud-platform-docs/platform-roadmap/phase-13-cicd
      title: Phase 13 documentation
      icon: docs
    - url: https://argocd.10.0.0.200.nip.io/applications/platform-demo
      title: ArgoCD Application
      icon: dashboard
    - url: https://github.com/andrelair-platform/platform-demo
      title: Source code
      icon: github
    - url: https://github.com/andrelair-platform/platform-demo/pkgs/container/platform-demo
      title: Container images on ghcr.io
      icon: image
spec:
  type: service
  lifecycle: production
  owner: andrelair-platform
  system: minicloud-platform
  providesApis:
    - platform-demo-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: platform-demo-api
  description: Minimal Go HTTP service demonstrating the full minicloud CI/CD pipeline. Returns build metadata as JSON.
  annotations:
    github.com/project-slug: andrelair-platform/platform-demo
  tags:
    - go
    - rest
    - demo
spec:
  type: openapi
  lifecycle: production
  owner: andrelair-platform
  system: minicloud-platform
  definition: |
    openapi: "3.0.3"
    info:
      title: platform-demo API
      version: "1.0.0"
      description: >
        Minimal Go service that demonstrates the minicloud CI/CD pipeline end-to-end.
        Returns build metadata (version, git SHA, hostname) as JSON.
    servers:
      - url: https://demo.devandre.sbs
        description: Public (via Cloudflare Tunnel)
      - url: http://platform-demo.gitops-demo.svc.cluster.local:9898
        description: In-cluster
    paths:
      /:
        get:
          summary: Build metadata
          operationId: getMetadata
          description: Returns app version, git commit SHA, hostname, Go version and current timestamp.
          responses:
            "200":
              description: Build metadata
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      app:
                        type: string
                        example: platform-demo
                      version:
                        type: string
                        example: "1.0.0"
                      commit:
                        type: string
                        example: abc1234
                      hostname:
                        type: string
                      go_version:
                        type: string
                        example: go1.25.0
                      now:
                        type: string
                        format: date-time
      /healthz:
        get:
          summary: Liveness probe
          operationId: healthz
          responses:
            "200":
              description: ok
      /readyz:
        get:
          summary: Readiness probe
          operationId: readyz
          responses:
            "200":
              description: ready
