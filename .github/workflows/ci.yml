name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # andrelair-platform/platform-demo
  GITOPS_REPO: andrelair-platform/minicloud-gitops
  GITOPS_PATH: manifests/platform-demo/00-deployment.yaml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run tests
        run: go test -v ./...

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to ghcr.io
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ldflags need full git history for short SHA

      - name: Compute build metadata
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          FULL=$(git rev-parse HEAD)
          echo "image_tag=${SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${SHA}"   >> "$GITHUB_OUTPUT"
          echo "commit=${FULL}"   >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      # Phase 16: cluster pulls go through Harbor's ghcr proxy cache,
      # not directly from ghcr.io. The image is still pushed to ghcr.io
      # by the build-and-push job above; Harbor pulls + caches on
      # demand when kubelet asks for it via this URL.
      NEW_IMAGE: harbor.10.0.0.200.nip.io/ghcr/${{ github.repository }}:${{ needs.build-and-push.outputs.image_tag }}
    steps:
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update file via GitHub Contents API
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          set -euo pipefail
          API="https://api.github.com/repos/${GITOPS_REPO}/contents/${GITOPS_PATH}"
          ACCEPT="Accept: application/vnd.github+json"

          # Diagnostic: prove which token format we have (without leaking it)
          PFX=$(printf '%s' "${GITOPS_TOKEN}" | cut -c1-4)
          LEN=${#GITOPS_TOKEN}
          echo "Token prefix=${PFX}***  length=${LEN}"

          # --no-netrc: ignore the runner's ~/.netrc (which actions/checkout
          # populated with the workflow's GITHUB_TOKEN, NOT scoped to the
          # gitops repo). -H Authorization should take precedence anyway, but
          # be explicit.
          echo "=== /user (token sanity) ==="
          curl --no-netrc -s -o /tmp/me.json -w "HTTP %{http_code}\n" \
            -H "Authorization: Bearer ${GITOPS_TOKEN}" -H "$ACCEPT" \
            https://api.github.com/user
          jq -r '.login // .message' /tmp/me.json

          echo "=== GET current file (need SHA for update) ==="
          HTTP=$(curl --no-netrc -s -o /tmp/current.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GITOPS_TOKEN}" -H "$ACCEPT" \
            "$API?ref=main")
          if [ "$HTTP" != "200" ]; then
            echo "GET failed (HTTP $HTTP):"
            cat /tmp/current.json
            exit 1
          fi
          jq '{path, sha, encoding, size}' /tmp/current.json
          OLD_SHA=$(jq -r .sha /tmp/current.json)

          echo "=== Decode + edit content ==="
          jq -r .content /tmp/current.json | base64 -d > /tmp/current.yaml
          yq -i '(.spec.template.spec.containers[] | select(.name == "platform-demo")).image = strenv(NEW_IMAGE)' /tmp/current.yaml
          NEW_B64=$(base64 -w0 /tmp/current.yaml)

          echo "=== Has the image actually changed? ==="
          if [ "$(jq -r .content /tmp/current.json | tr -d '\n')" = "$NEW_B64" ]; then
            echo "No change — image already at ${{ needs.build-and-push.outputs.image_tag }}"
            exit 0
          fi

          MSG="ci(platform-demo): bump image to ${{ needs.build-and-push.outputs.image_tag }} (from ${{ github.repository }}@${{ github.sha }}, run ${{ github.run_id }})"

          echo "=== PUT new content ==="
          jq -n \
            --arg msg "$MSG" \
            --arg content "$NEW_B64" \
            --arg sha "$OLD_SHA" \
            --arg branch main \
            --arg name "platform-demo CI" \
            --arg email "platform-demo-ci@andrelair-platform.users.noreply.github.com" \
            '{message: $msg, content: $content, sha: $sha, branch: $branch,
              committer: {name: $name, email: $email},
              author:    {name: $name, email: $email}}' > /tmp/payload.json

          curl --no-netrc -sfX PUT \
            -H "Authorization: Bearer ${GITOPS_TOKEN}" -H "$ACCEPT" \
            -d @/tmp/payload.json "$API" | jq '{commit: .commit.html_url, content_sha: .content.sha}'
