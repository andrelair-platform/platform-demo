name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # andrelair-platform/platform-demo
  GITOPS_REPO: andrelair-platform/minicloud-gitops
  GITOPS_PATH: manifests/platform-demo/00-deployment.yaml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run tests
        run: go test -v ./...

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to ghcr.io
      id-token: write   # Cosign keyless signing — request GitHub OIDC token
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ldflags need full git history for short SHA

      - name: Compute build metadata
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          FULL=$(git rev-parse HEAD)
          echo "image_tag=${SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${SHA}"   >> "$GITHUB_OUTPUT"
          echo "commit=${FULL}"   >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (CycloneDX JSON)
        run: |
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }} \
            -o cyclonedx-json=sbom.json

      - name: Sign image (keyless — GitHub OIDC → Sigstore Fulcio)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Attach SBOM to image as OCI referrer
        run: |
          cosign attach sbom \
            --sbom sbom.json \
            --type cyclonedx \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Install crane
        run: |
          curl -sSL https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz \
            | tar -xz crane
          sudo mv crane /usr/local/bin/

      - name: Push to Harbor (cluster registry via Cloudflare Tunnel)
        env:
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
        run: |
          crane auth login ${HARBOR_REGISTRY} -u admin -p ${HARBOR_PASSWORD}
          crane copy \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }} \
            ${HARBOR_REGISTRY}/ghcr/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}

  bump-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      NEW_IMAGE: harbor.10.0.0.200.nip.io/ghcr/${{ github.repository }}:${{ needs.build-and-push.outputs.image_tag }}
    steps:
      - name: Checkout minicloud-gitops
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Import GPG signing key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump image tag and push signed commit
        run: |
          yq -i '(select(.kind == "Deployment") | .spec.template.spec.containers[] | select(.name == "platform-demo")).image = strenv(NEW_IMAGE)' \
            "${{ env.GITOPS_PATH }}"
          git add "${{ env.GITOPS_PATH }}"
          if git diff --cached --quiet; then
            echo "No change — image already at ${{ needs.build-and-push.outputs.image_tag }}"
            exit 0
          fi
          git commit -S -m "ci(platform-demo): bump image to ${{ needs.build-and-push.outputs.image_tag }}"
          git push
