name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GITOPS_REPO: andrelair-platform/minicloud-gitops

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run tests
        run: go test -v ./...

  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      digest: ${{ steps.build.outputs.digest }}
      branch: ${{ steps.meta.outputs.branch }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute build metadata
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          BRANCH=${GITHUB_REF_NAME}
          if [ "$BRANCH" = "main" ]; then
            TAG="${SHA}"
          else
            TAG="${BRANCH}-${SHA}"
          fi
          echo "image_tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}"         >> "$GITHUB_OUTPUT"
          echo "version=${SHA}"           >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to ghcr.io
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Install Cosign
        if: github.ref_name != 'dev'
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        if: github.ref_name == 'main'
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (CycloneDX JSON)
        if: github.ref_name == 'main'
        run: |
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }} \
            -o cyclonedx-json=sbom.json

      - name: Sign image (keyless — GitHub OIDC → Sigstore Fulcio)
        if: github.ref_name != 'dev'
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Attach SBOM to image as OCI referrer
        if: github.ref_name == 'main'
        run: |
          cosign attach sbom \
            --sbom sbom.json \
            --type cyclonedx \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Install crane
        run: |
          curl -sSL https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz \
            | tar -xz crane
          sudo mv crane /usr/local/bin/

      - name: Push to Harbor (cluster registry via Cloudflare Tunnel)
        env:
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
        run: |
          crane auth login ${HARBOR_REGISTRY} -u admin -p ${HARBOR_PASSWORD}
          crane copy \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }} \
            ${HARBOR_REGISTRY}/ghcr/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}

  bump-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Determine gitops overlay path
        id: overlay
        run: |
          case "${{ needs.build-and-push.outputs.branch }}" in
            main)    echo "path=services/platform-demo/overlays/prod" >> $GITHUB_OUTPUT ;;
            staging) echo "path=services/platform-demo/overlays/staging" >> $GITHUB_OUTPUT ;;
            dev)     echo "path=services/platform-demo/overlays/dev" >> $GITHUB_OUTPUT ;;
          esac

      - name: Checkout minicloud-gitops
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Import GPG signing key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Install kustomize
        run: |
          curl -sSL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/

      - name: Bump image tag in overlay and push signed commit
        run: |
          cd "${{ steps.overlay.outputs.path }}"
          kustomize edit set image \
            harbor.10.0.0.200.nip.io/ghcr/${{ github.repository }}:${{ needs.build-and-push.outputs.image_tag }}
          cd -
          git add "${{ steps.overlay.outputs.path }}/kustomization.yaml"
          if git diff --cached --quiet; then
            echo "No change — image already at ${{ needs.build-and-push.outputs.image_tag }}"
            exit 0
          fi
          git commit -S -m "ci(platform-demo): bump ${{ needs.build-and-push.outputs.branch }} image to ${{ needs.build-and-push.outputs.image_tag }}"
          git push
