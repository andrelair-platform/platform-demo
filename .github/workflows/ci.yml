name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging]

env:
  REGISTRY: harbor.10.0.0.200.nip.io
  IMAGE_NAME: library/platform-demo
  GITOPS_REPO: andrelair-platform/minicloud-gitops

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: '1.23'
          cache: true

      - name: Run tests
        run: go test -v ./...

  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      digest: ${{ steps.build.outputs.digest }}
      branch: ${{ steps.meta.outputs.branch }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute build metadata
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          BRANCH=${GITHUB_REF_NAME}
          if [ "$BRANCH" = "main" ]; then
            TAG="${SHA}"
          else
            TAG="${BRANCH}-${SHA}"
          fi
          echo "image_tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}"         >> "$GITHUB_OUTPUT"
          echo "version=${SHA}"           >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4.1.3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # ── Trust the minicloud self-signed CA so Docker accepts Harbor TLS ────
      - name: Trust minicloud CA
        run: |
          sudo mkdir -p /etc/docker/certs.d/${{ env.REGISTRY }}
          echo "${{ secrets.MINICLOUD_CA_CERT }}" | sudo tee /etc/docker/certs.d/${{ env.REGISTRY }}/ca.crt
          echo "${{ secrets.MINICLOUD_CA_CERT }}" | sudo tee /usr/local/share/ca-certificates/minicloud-ca.crt
          sudo update-ca-certificates

      - name: Login to Harbor
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [registry."harbor.10.0.0.200.nip.io"]
              insecure = true

      - name: Build and push to Harbor
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Install Cosign
        if: github.ref_name != 'dev'
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        if: github.ref_name == 'main'
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (CycloneDX JSON)
        if: github.ref_name == 'main'
        run: |
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }} \
            -o cyclonedx-json=sbom.json

      - name: Sign image (keyless — GitHub OIDC → Sigstore Fulcio)
        if: github.ref_name != 'dev'
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Attach SBOM to image as OCI referrer
        if: github.ref_name == 'main'
        run: |
          cosign attach sbom \
            --sbom sbom.json \
            --type cyclonedx \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

  bump-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Determine gitops overlay path
        id: overlay
        run: |
          case "${{ needs.build-and-push.outputs.branch }}" in
            main)    echo "path=services/platform-demo/overlays/prod" >> $GITHUB_OUTPUT ;;
            staging) echo "path=services/platform-demo/overlays/staging" >> $GITHUB_OUTPUT ;;
            dev)     echo "path=services/platform-demo/overlays/dev" >> $GITHUB_OUTPUT ;;
          esac

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4.1.3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Trust minicloud CA
        run: |
          echo "${{ secrets.MINICLOUD_CA_CERT }}" \
            | sudo tee /usr/local/share/ca-certificates/minicloud-ca.crt
          sudo update-ca-certificates

      - name: Checkout minicloud-gitops
        uses: actions/checkout@v7
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Import GPG signing key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v3
        with:
          kustomize-version: "5.6.0"

      - name: Verify image exists in Harbor before gitops bump
        run: |
          TAG="${{ needs.build-and-push.outputs.image_tag }}"
          URL="https://${{ env.REGISTRY }}/v2/${{ env.IMAGE_NAME }}/manifests/${TAG}"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            --cacert /usr/local/share/ca-certificates/minicloud-ca.crt \
            -H "Authorization: Basic $(echo -n '${{ secrets.HARBOR_USER }}:${{ secrets.HARBOR_PASSWORD }}' | base64)" \
            "$URL")
          if [ "$STATUS" != "200" ]; then
            echo "Image $TAG not found in Harbor (HTTP $STATUS) — aborting gitops bump"
            exit 1
          fi
          echo "Image $TAG confirmed in Harbor (HTTP $STATUS)"

      - name: Bump image tag in overlay and push signed commit
        run: |
          cd "${{ steps.overlay.outputs.path }}"
          kustomize edit set image \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}
          cd -
          git add "${{ steps.overlay.outputs.path }}/kustomization.yaml"
          if git diff --cached --quiet; then
            echo "No change — image already at ${{ needs.build-and-push.outputs.image_tag }}"
            exit 0
          fi
          git commit -S -m "ci(platform-demo): bump ${{ needs.build-and-push.outputs.branch }} image to ${{ needs.build-and-push.outputs.image_tag }}"
          git push
